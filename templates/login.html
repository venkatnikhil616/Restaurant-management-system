{% extends "parent.html" %}

{% block title %}Sign In - Restaurant Management{% endblock %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="text-center mb-4">Sign In</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control text-white" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control text-white" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
            </form>
            <p class="mt-3 text-center">
                <small>Need an account? Contact the admin.</small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
